<!DOCTYPE html>
<html>
  <head>
      <!--<script src="https://kit.fontawesome.com/d006b1bca2.js" crossorigin="anonymous"></script>-->
        <link rel="stylesheet" href="./style.css" type="text/css"/>
        <script type="text/javascript" src="./wheel.js" defer></script>
        <script type="module" src="./index.js"></script>
  </head>
  <body>
      <template id="day-template">
          <div class="day-status">
              <div class="status "></div>
              <div class="status "></div>
              <div class="status neutral">
                <span class="full">${full}</span>
                <span class="abbr">${abbr}</span>
                <span class="initial">${initial}</span>
              </div>
              <div class="status "></div>
              <div class="status "></div>
          </div>
      </template>
      <div id="day-container" class="day-container">
      </div>
      
      <div id="current-status">
          <template id="current-status-item">
              <div class="unit value "><i class="fa-solid "></i></div>
          </template>
          <template id="current-status-ghost-item">
              <div class="unit ghost"></div>
          </template>

        <div class="daily-total">
            <div id="negative-total" class="side-total">${negativeTotal}</div>
            <div id="negative-blocks" class="block-container"></div>
            <div class="center-divider"></div>
            <div id="positive-blocks" class="block-container"></div>
            <div id="positive-total" class="side-total">${positiveTotal}</div>
        </div>
    </div>
          
    <div class="main-form">

        <div class="task-selector">
            <div class="radial-container">
            <svg id="category-wheel" class="wheel-layer active" viewBox="0 0 200 200" >
            </svg>

            <svg id="submenu-wheel" class="wheel-layer hidden" viewBox="0 0 200 200" >
            </svg>
            </div>
        </div>

    </div>

  </body>
<html>
