<!DOCTYPE html>
<html>
  <head>
      <!--<script src="https://kit.fontawesome.com/d006b1bca2.js" crossorigin="anonymous"></script>-->
      <script
			  src="https://code.jquery.com/jquery-4.0.0.min.js"
			  integrity="sha256-OaVG6prZf4v69dPg6PhVattBXkcOWQB62pdZ3ORyrao="
			  crossorigin="anonymous"></script>
      
        <link rel="stylesheet" href="./style.css" type="text/css"/>
        <script type="text/javascript" src="./config.js" defer></script>
        <script type="text/javascript" src="./index.js" defer></script>
  </head>
  <body>
      <template id="day-template">
          <div class="day-status">
              <div class="status ${value2}"></div>
              <div class="status ${value1}"></div>
              <div class="status neutral">
                <span class="full">${full}</span>
                <span class="abbr">${abbr}</span>
                <span class="initial">${initial}</span>
              </div>
              <div class="status ${value-1}"></div>
              <div class="status ${value-2}"></div>
          </div>
      </template>
      <div id="day-container" class="day-container">
      </div>
      
      <div id="current-status">
          <template id="current-status-item">
              <div class="unit value ${type}"><i class="fa-solid ${iconClass}"></i></div>
          </template>
          <template id="current-status-ghost-item">
              <div class="unit ghost"></div>
          </template>

        <div class="daily-total">
            <div id="negative-total" class="side-total">${negativeTotal}</div>
            <div id="negative-blocks" class="block-container"></div>
            <div class="center-divider"></div>
            <div id="positive-blocks" class="block-container"></div>
            <div id="positive-total" class="side-total">${positiveTotal}</div>
        </div>

    </div>
          
    <div class="main-form">

        <div id="behaviour-selection" class="button-group">
            <template id="behaviour-selector-template">
                <button id="behaviour-${id}" class="behaviour-selector">
                    <span class="behaviour-icon">${icon}</span>
                    <span class="behaviour-description">${description}</span>
                </button>
            </template>


        </div>

        <fieldset id="activity-selection">
            <legend>Type</legend>

            <div>
                <input type="radio" name="activity-type" id="strength" value="strength"/>
                <label for="strength">Strength Training</label>
            </div>
            <div>
                <input type="radio" name="activity-type" id="pilates" value="pilates"/>
                <label for="pilates">Pilates</label>
            </div>
            <div>
                <input type="radio" name="activity-type" id="running" value="running"/>
                <label for="running">Running</label>
            </div>

            <div>
                <input type="radio" name="activity-type" id="squash" value="squash"/>
                <label for="squash">Squash</label>
            </div>
            <div>
                <input type="radio" name="activity-type" id="cycling" value="cycling"/>
                <label for="cycling">Cycling</label>
            </div>
            <div>
                <input type="radio" name="activity-type" id="active-travel" value="active-travel"/>
                <label for="active-travel">Active Travel</label>
            </div>
            <div>
                <input type="radio" name="activity-type" id="mobility" value="mobility"/>
                <label for="mobility">Mobility</label>
            </div>
            <div>
                <input type="radio" name="activity-type" id="snack" value="snack"/>
                <label for="snack">Snack</label>
            </div>
            <div>
                <input type="radio" name="activity-type" id="food-choice" value="food-choice"/>
                <label for="food-choice">Food Choice</label>
            </div>
            <div>
                <input type="radio" name="activity-type" id="no-exercise" value="no-exercise"/>
                <label for="no-exercise">No Exercise</label>
            </div>
            <div>
                <input type="radio" name="activity-type" id="bedtime" value="bedtime"/>
                <label for="bedtime">Bedtime</label>
            </div>
        </fieldset>

        <fieldset id="score-selection">
            <legend>Type</legend>

            <div>
                <input type="radio" name="score" id="minus-three" value="-3"/>
                <label for="minus-three">-3</label>
            </div>
            <div>
                <input type="radio" name="score" id="minus-two" value="-2"/>
                <label for="minus-two">-2</label>
            </div>
            <div>
                <input type="radio" name="score" id="minus-one" value="-1"/>
                <label for="minus-one">-1</label>
            </div>
            <div>
                <input type="radio" name="score" id="plus-one" value="+1"/>
                <label for="plus-one">+2</label>
            </div>
            <div>
                <input type="radio" name="score" id="plus-two" value="+2"/>
                <label for="plus-two">+1</label>
            </div>
            <div>
                <input type="radio" name="score" id="plus-three" value="+3"/>
                <label for="plus-three">+3</label>
            </div>

        </fieldset>
    </div>

  </body>
</head>
