<html>
  <head>
      <script src="https://kit.fontawesome.com/d006b1bca2.js" crossorigin="anonymous"></script>
      <script
			  src="https://code.jquery.com/jquery-4.0.0.min.js"
			  integrity="sha256-OaVG6prZf4v69dPg6PhVattBXkcOWQB62pdZ3ORyrao="
			  crossorigin="anonymous"></script>
      
      <style>
        
        .day-container {
            display: flex;
            flex-direction: row-reverse;
            flex-wrap: nowrap;
            justify-content: space-evenly;

            gap: 5%;

            .day-status {

                display: flex;
                flex: 1 0;
                justify-content: space-evenly;
                flex-direction: column;
                flex-wrap: nowrap;
                gap: 5px;

                .status {

                    display: flex;
                    flex: 1 0 25px;
                   /* width: 25px;*/
                    height: 25px;
                    gap: 5px;
                    border: 2px solid black;
                    border-radius: 5px;
                    background-color: black;
                    
                    color: white;
                    justify-content: center;
                    align-content: center;
                    align-items: center;
                        display: flex;

                    &.positive {
                        background-color: green;
                    }
                    &.neutral {
                        background-color: rgba(0,0,0, 0.5);
                        container-type: inline-size;
                    }
                    &.negative {
                        background-color: red;
                    }
                    &.empty {
                        background-color: rgba(0, 0, 0, 0.1);
                        border-color: rgba(0, 0, 0, 0.2);
                    }


                    span {


                        display: none;
                    }

                    @container (width <= 50px) {
                        span.initial {
                            display: inline;
                        }
                    }
                    @container (50px < width <= 100px) {
                        span.abbr {
                            display: inline;
                        }
                    }
                    @container (width > 100px) {
                        span.full {
                            display: inline;
                        }
                    }
                }
            }
        }

        #current-status {

            display: flex;
            margin: 50px;

            .status {

                flex: 1 1 auto;
                display: flex;
                height: 50px;
                border: 2px solid black;
                align-items: center;
                justify-content: center;

                &.negative {
                    background-color: red;
                }

                &.penalty {
                    background-color: darkred;
                }
                &.positive {
                    background-color: green;
                }

                &.bonus {
                    background-color: lightgreen;
                }


                &.weight-1 {
                    flex-grow: 1;
                }
                
                &.weight-2 {
                    flex-grow: 2;
                }

                &.weight-3 {
                    flex-grow: 3;
                }

                i {
                    width: 20px;
                    height: 20px;
                }
        }

        .
      </style>
  </head>
  <body>
      <template id="day-template">
          <div class="day-status">
              <div class="status ${value2}"></div>
              <div class="status ${value1}"></div>
              <div class="status neutral">
                <span class="full">${full}</span>
                <span class="abbr">${abbr}</span>
                <span class="initial">${initial}</span>
              </div>
              <div class="status ${value-1}"></div>
              <div class="status ${value-2}"></div>
          </div>
      </template>
      <div id="day-container" class="day-container">
      </div>
      
      <div id="current-status">
          <template id="current-status-item">
              <div class="status ${weight} ${type}"></div>
          </template>

          <div class="total">14</div>
          <div class="status"></div>
          <div class="status negative"><i class="fa-solid fa-cookie-bite"></i></div>
          <div class="status weight-3 negative"><i class="fa-solid fa-couch"></i></div>
          <div class="status weight-2 penalty"><i class="fa-solid fa-bed"></i></div>
          <div class="status weight-2 bonus"><i class="fa-solid fa-person-running"></i></div>
          <div class="status weight-2 positive"><i class="fa-solid fa-dumbbell"></i></div>
          <div class="status"></div>
          <div class="total">9</div>
          
      </div>

    <script type="text/javascript">

          $(() => {
              const currentDate = new Date();
              const todayDateInfo = getDateInfo(currentDate);


              const lastSevenDayInfo = getPreviousDates(currentDate, 7).map(getDateInfo);
            
              console.log(lastSevenDayInfo);
              populateDayHistory(lastSevenDayInfo);
          });

          function populateDayHistory(dayInfos) {

              const values = Array.from({ length: dayInfos.length }, () => Math.floor(Math.random() * 5) - 2);




              let $dayContainer = $("#day-container");

              for (let i = 0; i < dayInfos.length; i++) {

                  let dayInfo = dayInfos[i];
                  let value = values[i];

                  let dayTemplate = populateDayHistoryTemplate(dayInfo, value);

                  console.log(dayInfo);
                  console.log(dayTemplate);
                  $dayContainer.append(dayTemplate);
              }
          }
          
          function populateDayHistoryTemplate(dayInfo, value) {
            let dayTemplate = $("#day-template").html();

            const positive = "positive";
            const negative = "negative";
            const empty = "empty";

            let value2 = value == 2 ? positive : empty;
            let value1 = value > 0 ? positive : empty;
            let value_1 = value < 0 ? negative : empty;
            let value_2 = value == -2 ? negative : empty;

            dayTemplate = dayTemplate.replaceAll("${value2}", value2);
            dayTemplate = dayTemplate.replaceAll("${value1}", value1);
            dayTemplate = dayTemplate.replaceAll("${value-1}", value_1);
            dayTemplate = dayTemplate.replaceAll("${value-2}", value_2);
            
            dayTemplate = dayTemplate.replaceAll("${full}", dayInfo.dayName);
            dayTemplate = dayTemplate.replaceAll("${abbr}", dayInfo.dayName.substring(0, 3));
            dayTemplate = dayTemplate.replaceAll("${initial}", dayInfo.dayName.charAt(0));
            return dayTemplate;
          }

          /*
           * Returns an object containing the zeroed Date, a formatted Date and the
           * day initial.
           */
          function getDateInfo(date) {
            let year = date.getFullYear().toString();
            let month = date.getMonth().toString().padStart(2, '0');
            let day = date.getDate().toString().padStart(2, '0');

            let actualDate = new Date(year, month, day);
            let actualDateFormat = [year, month, day].join("-");
            let dayName = actualDate.toLocaleDateString(undefined, {weekday: 'long'});

            return {
                date: actualDate,
                formattedDate: actualDateFormat,
                dayName: dayName,
            };
          }

          function getPreviousDates(date, numberOfPriorDays) {
              let result = new Array(numberOfPriorDays);
              for (let i = 0; i < numberOfPriorDays; i++) {

                  let newDate = new Date(date);
                  newDate.setDate(newDate.getDate() - i - 1);
                  result[i] = newDate;
              }

              return result;
          }
      </script>
  </body>
</head>
